function fmtM(v){if(v==null||v==='')return'—';var n=Math.round(v/10000);return(v<0?'▲':'')+Math.abs(n).toLocaleString()+'万';}
function fmtY(v){if(v==null||v==='')return'—';return(v<0?'▲':'')+Math.abs(Math.round(v)).toLocaleString()+'円';}
function fmtN(v,u){return(v==null||v==='')?(u?'—':'—'):Number(v).toLocaleString()+(u||'');}
function fmtKpi(v,unit){
  if(v==null||v==='')return'—';
  if(unit==='man')return fmtM(v);
  if(unit==='yen')return fmtY(v);
  if(unit==='pct')return v+'%';
  if(unit==='mei')return Number(v).toLocaleString()+'名';
  if(unit==='num')return Number(v).toLocaleString()+'件';
  return String(v);
}
function colV(v){return v>0?C.green:v<0?C.red:C.textX;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function csvSplit(line){
  var r=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}else if(c===','&&!inQ){r.push(cur.trim());cur='';}else{cur+=c;}}
  r.push(cur.trim());return r;
}
function parseCSV(text){
  if(!text||!text.trim())return{};
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  var hdrLine=null;
  for(var i=0;i<lines.length;i++){if(lines[i].indexOf('5月')>=0){hdrLine=lines[i];break;}}
  if(!hdrLine)return{};
  var hdr=csvSplit(hdrLine),midx={};
  for(var i=0;i<hdr.length;i++){if(FM.indexOf(hdr[i])>=0)midx[hdr[i]]=i;}
  if(!Object.keys(midx).length)return{};
  var data={};
  lines.forEach(function(line){
    var cs=csvSplit(line);
    var label=(cs[0]===''&&cs.length>1&&cs[1])?cs[1]:cs[0];
    if(!label)return;
    var vals={};
    FM.forEach(function(m){var i=midx[m];if(i==null||i>=cs.length){vals[m]=0;return;}var raw=cs[i].replace(/,/g,'');vals[m]=(raw!==''&&!isNaN(parseInt(raw)))?parseInt(raw):0;});
    if(Object.values(vals).some(function(v){return v!==0;})&&!data[label])data[label]=vals;
  });
  return data;
}
function getMonthData(m){
  function g(k){return(S.raw[k]&&S.raw[k][m])||0;}
  return{month:m,rev:g('売上高'),op:g('営業利益'),net:g('当期純利益'),sg:g('販売費及び一般管理費合計'),eco:g('経常利益')};
}

function badge(t,c){return'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+esc(t)+'</span>';}
function card(inner,xs){return'<div style="background:'+C.white+';border-radius:14px;border:1px solid '+C.border+';box-shadow:0 1px 4px rgba(0,0,0,.06);padding:18px 20px;'+(xs||'')+'">'+inner+'</div>';}
function cardNP(inner,xs){return'<div style="background:'+C.white+';border-radius:14px;border:1px solid '+C.border+';box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;'+(xs||'')+'">'+inner+'</div>';}
function slabel(ic,t){return'<div style="display:flex;align-items:center;gap:7px;margin-bottom:12px"><span style="font-size:14px">'+ic+'</span><span style="font-size:13px;font-weight:700;color:'+C.textM+'">'+esc(t)+'</span></div>';}
function btnP(id,t,xs){return'<button id="'+id+'" style="padding:8px 18px;border-radius:9px;border:none;background:linear-gradient(135deg,'+C.teal+','+C.blue+');color:white;font-weight:700;font-size:12px;cursor:pointer;'+(xs||'')+'">'+t+'</button>';}
function btnS(id,t,xs){return'<button id="'+id+'" style="padding:8px 14px;border-radius:9px;border:1px solid '+C.border+';background:'+C.white+';color:'+C.textM+';font-size:12px;cursor:pointer;'+(xs||'')+'">'+t+'</button>';}
function kTile(label,value,accent,sub){
  var a=accent||C.teal;
  var neg=typeof value==='string'&&value.charAt(0)==='▲';
  var vc=(value==='—')?C.textX:neg?C.red:a;
  return'<div style="background:'+C.white+';border-radius:12px;border:1px solid '+C.border+';padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)">'
    +'<div style="font-size:9px;font-weight:700;color:'+C.textX+';letter-spacing:.08em;margin-bottom:5px">'+esc(label)+'</div>'
    +'<div style="font-size:19px;font-weight:900;color:'+vc+';line-height:1.1">'+esc(value)+'</div>'
    +(sub?'<div style="font-size:10px;color:'+C.textX+';margin-top:3px">'+esc(sub)+'</div>':'')
    +'</div>';
}
function renderMd(text){
  if(!text)return'';

  // インラインスタイル: **太字** と `コード`
  function inlineStyle(s){
    return s
      .replace(/\*\*([^*]+)\*\*/g,'<strong style="font-weight:800;color:'+C.text+'">$1</strong>')
      .replace(/`([^`]+)`/g,'<code style="background:'+C.surf+';border:1px solid '+C.border+';border-radius:4px;padding:1px 5px;font-size:12px">$1</code>');
  }

  var lines=text.split('\n');
  var out=[];
  var i=0;

  while(i<lines.length){
    var line=lines[i];

    // ─ H1: # → セクション見出し（番号バッジ付き）
    if(line.startsWith('# ')){
      var title=line.slice(2).trim();
      // 先頭の①②...や数字を抽出
      var numM=title.match(/^([①②③④⑤⑥⑦⑧⑨⑩\d]+[\.\s]?)\s*/);
      var badge2='',rest=title;
      if(numM){badge2='<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,'+C.teal+','+C.blue+');color:white;font-size:11px;font-weight:800;flex-shrink:0;margin-right:9px">'+esc(numM[1].trim())+'</span>';rest=title.slice(numM[0].length);}
      out.push('<div style="display:flex;align-items:center;border-bottom:2px solid '+C.tealL+';padding-bottom:10px;margin:28px 0 14px">'+badge2+'<span style="font-size:15px;font-weight:800;color:'+C.text+'">'+inlineStyle(esc(rest))+'</span></div>');
      i++;continue;
    }

    // ─ H2: ## → サブ見出し
    if(line.startsWith('## ')){
      out.push('<div style="font-size:13px;font-weight:800;color:'+C.teal+';margin:18px 0 8px;padding-left:10px;border-left:3px solid '+C.teal+'">'+inlineStyle(esc(line.slice(3).trim()))+'</div>');
      i++;continue;
    }

    // ─ H3: ### → 小見出し
    if(line.startsWith('### ')){
      out.push('<div style="font-size:12px;font-weight:700;color:'+C.textM+';margin:14px 0 6px;text-decoration:underline;text-underline-offset:3px">'+inlineStyle(esc(line.slice(4).trim()))+'</div>');
      i++;continue;
    }

    // ─ 箇条書きブロック（連続する - をまとめてulに）
    if(line.startsWith('- ')||line.startsWith('・')){
      var items=[];
      while(i<lines.length&&(lines[i].startsWith('- ')||lines[i].startsWith('・'))){
        var itemText=lines[i].startsWith('- ')?lines[i].slice(2):lines[i].slice(1);
        items.push('<li style="margin:5px 0;line-height:1.75;font-size:13px;color:'+C.textM+'">'+inlineStyle(esc(itemText.trim()))+'</li>');
        i++;
      }
      out.push('<ul style="margin:6px 0 10px 0;padding-left:20px;list-style:none">'+items.map(function(li){return li.replace('<li ','<li style="position:relative" ').replace('<li style="position:relative" ','<li style="position:relative;margin:5px 0;line-height:1.75;font-size:13px;color:'+C.textM+'" ');}).join('')+'</ul>');
      // シンプルにそのままulで出す
      out[out.length-1]='<ul style="margin:6px 0 10px 0;padding:0;list-style:none">'+items.map(function(li){
        return li.replace('style="margin:5px 0;line-height:1.75;font-size:13px;color:'+C.textM+'"',
          'style="display:flex;align-items:flex-start;gap:8px;margin:5px 0;line-height:1.75;font-size:13px;color:'+C.textM+'"')
          .replace('<li ','<li ').replace(/>([^<])/,'><span style="color:'+C.teal+';font-weight:900;margin-top:1px;flex-shrink:0">▸</span><span>$1')+'</span></li>'.replace(/<\/li>$/,'');
      }).join('')+'</ul>';
      continue;
    }

    // ─ 数字付きリスト: 1. 2.
    if(/^\d+\.\s/.test(line)){
      var numItems=[];
      var n=1;
      while(i<lines.length&&/^\d+\.\s/.test(lines[i])){
        var ntext=lines[i].replace(/^\d+\.\s*/,'');
        numItems.push('<li style="display:flex;align-items:flex-start;gap:10px;margin:7px 0;font-size:13px;line-height:1.75;color:'+C.textM+'">'
          +'<span style="display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:50%;background:'+C.teal+';color:white;font-size:10px;font-weight:800;flex-shrink:0;margin-top:2px">'+n+'</span>'
          +'<span>'+inlineStyle(esc(ntext.trim()))+'</span></li>');
        n++;i++;
      }
      out.push('<ol style="margin:6px 0 10px 0;padding:0;list-style:none">'+numItems.join('')+'</ol>');
      continue;
    }

    // ─ 区切り線
    if(line.trim()==='---'||line.trim()==='***'||line.trim()==='==='){
      out.push('<hr style="border:none;border-top:1px solid '+C.border+';margin:20px 0"/>');
      i++;continue;
    }

    // ─ ハイライトブロック > で始まる行
    if(line.startsWith('> ')){
      var qlines=[];
      while(i<lines.length&&lines[i].startsWith('> ')){qlines.push(lines[i].slice(2));i++;}
      out.push('<div style="margin:10px 0;padding:12px 16px;background:'+C.tealL+';border-left:4px solid '+C.teal+';border-radius:0 10px 10px 0">'
        +'<div style="font-size:13px;line-height:1.8;color:'+C.textM+'">'+qlines.map(function(l){return inlineStyle(esc(l));}).join('<br>')+'</div></div>');
      continue;
    }

    // ─ 空行
    if(!line.trim()){out.push('<div style="height:6px"></div>');i++;continue;}

    // ─ 通常テキスト
    out.push('<p style="margin:5px 0;line-height:1.85;font-size:13px;color:'+C.textM+'">'+inlineStyle(esc(line))+'</p>');
    i++;
  }
  return out.join('');
}

function buildHeader(){

    :'<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:'+C.textX+'"><div style="width:6px;height:6px;border-radius:50%;background:'+C.amber+'"></div>ローカル保存のみ</div>';

  if(S.showSettings){
    settingsHtml='<div style="background:'+C.surf+';border-bottom:1px solid '+C.border+';padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
      +'<div style="display:flex;align-items:center;gap:7px">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+(S.gasConnected?C.green:C.amber)+'"></div>'

      +'</div>'
      +(S.gasConnected?btnP('btn-sync2','🔄 今すぐ同期','font-size:11px;padding:6px 14px'):'')
      +(S.dbLoading?'<span style="font-size:11px;color:'+C.textX+'">同期中...</span>':'')
      +'</div>';
  }
  var tabs=FM.map(function(m){
    var d=getMonthData(m),iC=(S.view===m);
    var hD=d.rev>0||d.sg>0,hR=!!(S.reports[m]&&S.reports[m].text),hK=!!S.kpiData[m];

      +'<div style="display:flex;align-items:center;gap:2px">'+m+(hR?'<div style="width:4px;height:4px;border-radius:50%;background:'+C.green+'"></div>':'')+(hK?'<div style="width:4px;height:4px;border-radius:50%;background:'+C.indigo+'"></div>':'')+'</div>'
      +'<div style="font-size:8px;color:'+(hD?(d.net>=0?C.green:C.red):C.textX)+'">'+(hD?fmtM(d.net):'未確定')+'</div>'
      +'</button>';
  }).join('');
  return'<header style="background:'+C.white+';border-bottom:1px solid '+C.border+';position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.05)">'
    +'<div style="display:flex;align-items:center;padding:0 18px;height:52px;border-bottom:1px solid '+C.border+';gap:10px">'
    +'<div style="display:flex;align-items:center;gap:8px;padding-right:14px;border-right:1px solid '+C.border+';flex-shrink:0">'
    +'<div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,'+C.teal+','+C.blue+');display:flex;align-items:center;justify-content:center;font-size:14px">📊</div>'
    +'<div><div style="font-size:13px;font-weight:800;color:'+C.text+'">経営ダッシュボード</div><div style="font-size:9px;color:'+C.textX+'">2025年度</div></div></div>'
    +'<div id="csv-drop" style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;border:1.5px dashed '+C.border+';cursor:pointer;flex-shrink:0">'
    +'<input id="csv-input" type="file" accept=".csv" style="display:none"><span style="font-size:13px">📂</span>'
    +'<div><div style="font-size:10px;font-weight:700;color:'+C.teal+'">損益CSV</div><div style="font-size:9px;color:'+C.textX+';max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(S.csvName)+'</div></div></div>'
    +'<div id="kpi-drop" style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;border:1.5px dashed '+C.border+';cursor:pointer;flex-shrink:0">'
    +'<input id="kpi-input" type="file" accept=".docx,.doc" style="display:none"><span style="font-size:13px">📋</span>'
    +'<div><div style="font-size:10px;font-weight:700;color:'+C.indigo+'">KPIレポート</div><div style="font-size:9px;color:'+C.textX+'">.docx</div></div></div>'
    +(S.kpiLoading?'<div style="display:flex;align-items:center;gap:6px">'+dots()+'<span style="font-size:11px;color:'+C.teal+'">'+esc(S.kpiMsg)+'</span></div>':S.kpiMsg?'<div style="font-size:11px;color:'+(S.kpiMsg.startsWith('⚠️')?C.red:C.green)+'">'+esc(S.kpiMsg)+'</div>':'')
    +'<div style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0">'+gasBar
    +'<button id="btn-settings" style="padding:5px 10px;border-radius:7px;border:1px solid '+C.border+';font-size:11px;font-weight:700;cursor:pointer;background:'+(S.showSettings?C.tealL:C.white)+';color:'+(S.showSettings?C.teal:C.textS)+'">⚙️ DB設定</button>'
    +'</div></div>'
    +settingsHtml
    +'<div style="display:flex;align-items:stretch;overflow-x:auto;padding-left:6px;background:'+C.white+'">'
    +'<button class="mtab" data-view="trend" style="padding:0 14px;border:none;cursor:pointer;font-size:12px;font-weight:'+(S.view==='trend'?700:500)+';border-bottom:2.5px solid '+(S.view==='trend'?C.teal:'transparent')+';background:transparent;color:'+(S.view==='trend'?C.teal:C.textS)+';white-space:nowrap;flex-shrink:0;height:44px">2025年度 全体</button>'
    +tabs+'</div></header>';
}

function buildTrend(){
  var allD=FM.map(getMonthData);
  var active=allD.filter(function(d){return d.rev>0||d.sg>0;});
  if(!active.length){
    return card('<div style="text-align:center;padding:48px 20px"><div style="font-size:48px;margin-bottom:16px">📂</div><div style="font-size:16px;font-weight:700;color:'+C.textM+';margin-bottom:8px">損益データがありません</div><div style="font-size:13px;color:'+C.textS+';margin-bottom:24px">ヘッダーの「損益CSV」からアップロードしてください</div>'+btnP('btn-open-csv','📂 CSVをアップロード','padding:11px 26px;font-size:14px')+'</div>');
  }
  var totalRev=active.reduce(function(s,d){return s+d.rev;},0);
  var totalNet=active.reduce(function(s,d){return s+d.net;},0);
  var totalSg=active.reduce(function(s,d){return s+d.sg;},0);
  var last=active[active.length-1];
  var avgSg=active.length?Math.round(totalSg/active.length):0;
  var balMonths=FM.filter(function(m){return S.finNotes[m]&&S.finNotes[m].balance!=null;});
  var lastBalM=balMonths.length?balMonths[balMonths.length-1]:null;
  var lastBal=lastBalM!=null?S.finNotes[lastBalM].balance:null;
  var remainM=(lastBal!=null&&avgSg)?Math.floor(lastBal/avgSg):null;
  var memMs=active.filter(function(d){return S.kpiData[d.month]&&S.kpiData[d.month].members_end;});
  var lastKpi=memMs.length?S.kpiData[memMs[memMs.length-1].month]:{};
  var allExp=[];
  FM.forEach(function(m){var n=S.finNotes[m]||{};(n.expenses||[]).filter(function(e){return e.label;}).forEach(function(e){allExp.push(Object.assign({month:m},e));});});

  // ── メイングラフ（売上・販管費・純利益）─────────────────────
  var maxRev=Math.max.apply(null,active.map(function(d){return Math.max(d.rev,d.sg);}));if(maxRev<=0)maxRev=1;
  var GH=140; // グラフ高さpx
  var bars=active.map(function(d){
    var note=S.finNotes[d.month]||{};
    var hasExp=(note.expenses||[]).some(function(e){return e.label;});
    var rh=Math.max(4,Math.round(d.rev/maxRev*GH));
    var sh=Math.max(4,Math.round(d.sg/maxRev*GH));
    var netPos=d.net>=0;
    var netColor=netPos?C.green:C.red;
    var mo=d.month.replace(/^\d{4}年/,'').replace('月','');
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;min-width:36px;cursor:default">'
      // 売上・販管費の数値ラベル（最新月のみ）
      +(d===last?'<div style="font-size:9px;color:'+C.teal+';font-weight:700;margin-bottom:2px">'+Math.round(d.rev/10000)+'万</div>':'<div style="height:15px"></div>')
      // 棒グラフ本体
      +'<div style="width:100%;height:'+GH+'px;display:flex;align-items:flex-end;justify-content:center;gap:2px;position:relative">'
      +'<div style="width:42%;height:'+rh+'px;background:'+C.teal+';border-radius:4px 4px 0 0;position:relative">'
        +(rh>28?'<div style="position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:8px;color:white;font-weight:700">'+Math.round(d.rev/10000)+'</div>':'')
      +'</div>'
      +'<div style="width:42%;height:'+sh+'px;background:'+C.amber+';border-radius:4px 4px 0 0;position:relative">'
        +(sh>28?'<div style="position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:8px;color:white;font-weight:700">'+Math.round(d.sg/10000)+'</div>':'')
      +'</div>'
      +(hasExp?'<div style="position:absolute;top:2px;right:2px;font-size:10px">⚠️</div>':'')
      +'</div>'
      // 純利益ライン（±表示）
      +'<div style="width:100%;display:flex;justify-content:center;align-items:center;padding:3px 0;border-top:2px solid '+C.border+';border-bottom:1px dashed '+C.border+'">'
        +'<span style="font-size:9px;font-weight:800;color:'+netColor+'">'+(netPos?'▲':'▼')+Math.round(Math.abs(d.net)/10000)+'</span>'
      +'</div>'
      // 月ラベル
      +'<div style="font-size:10px;color:'+C.textS+';margin-top:4px;font-weight:600">'+mo+'月</div>'
      +'</div>';
  }).join('');

  var mainChart = slabel('📊','月次グラフ（万円）')
    +'<div style="display:flex;gap:10px;margin-bottom:10px">'
      +'<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:'+C.textM+'">'
        +'<span style="display:inline-block;width:12px;height:12px;background:'+C.teal+';border-radius:2px"></span>売上</span>'
      +'<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:'+C.textM+'">'
        +'<span style="display:inline-block;width:12px;height:12px;background:'+C.amber+';border-radius:2px"></span>販管費</span>'
      +'<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:'+C.textM+'">'
        +'<span style="font-size:10px;font-weight:800;color:'+C.green+'">▲</span>/<span style="font-size:10px;font-weight:800;color:'+C.red+'">▼</span>純利益</span>'
    +'</div>'
    +'<div style="display:flex;align-items:flex-end;gap:3px;padding:4px 0 0">'+bars+'</div>';

  // ── 残高グラフ ──────────────────────────────────────────
  var balData=FM.map(function(m){return{month:m,bal:S.finNotes[m]&&S.finNotes[m].balance!=null?S.finNotes[m].balance:null};}).filter(function(d){return d.bal!=null;});
  var balChart='';
  if(balData.length>=2){
    var maxBal=Math.max.apply(null,balData.map(function(d){return Math.abs(d.bal);}));if(maxBal<=0)maxBal=1;
    var bBars=balData.map(function(d){
      var h=Math.max(4,Math.round(Math.abs(d.bal)/maxBal*100));
      var bc=d.bal>=0?C.blue:C.red;
      var mo=d.month.replace(/^\d{4}年/,'').replace('月','');
      return '<div style="flex:1;min-width:28px;display:flex;flex-direction:column;align-items:center">'
        +'<div style="font-size:9px;color:'+bc+';font-weight:700;margin-bottom:3px">'+Math.round(d.bal/10000)+'万</div>'
        +'<div style="width:70%;height:'+h+'px;background:'+bc+';border-radius:4px 4px 0 0"></div>'
        +'<div style="font-size:10px;color:'+C.textS+';margin-top:4px;font-weight:600">'+mo+'月</div>'
        +'</div>';
    }).join('');
    balChart=slabel('💰','残高推移（万円）')+'<div style="display:flex;align-items:flex-end;gap:3px;padding:4px 0 0;min-height:130px">'+bBars+'</div>';
  }else{
    balChart=slabel('💰','残高推移')+'<div style="text-align:center;padding:20px 10px"><div style="font-size:28px;margin-bottom:8px">📝</div><div style="font-size:12px;color:'+C.textS+';line-height:1.7">各月の「財務」タブで<br>月末残高を入力すると<br>グラフが表示されます</div></div>';
  }

  // ── 大型支出 ────────────────────────────────────────────
  var expHtml='';
  if(allExp.length){
    var rows=allExp.map(function(e){
      var tg=e.type==='plan'?C.purple:C.orange;
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;background:'+(e.type==='plan'?C.purpleL:C.amberL)+';border:1px solid '+(e.type==='plan'?C.purple+'33':C.amber+'44')+'">'
        +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:'+tg+';color:white;flex-shrink:0">'+(e.type==='plan'?'予定':'実績')+'</span>'
        +'<span style="font-weight:700;color:'+C.textM+';font-size:12px;flex-shrink:0">'+esc(e.month)+'</span>'
        +(e.date?'<span style="font-size:11px;color:'+C.textS+'">'+esc(e.date)+'</span>':'')
        +'<span style="flex:1;font-size:13px;color:'+C.textM+'">'+esc(e.label)+'</span>'
        +(e.amount?'<span style="font-size:13px;font-weight:700;color:'+tg+'">'+fmtM(e.amount*10000)+'</span>':'')
        +'</div>';
    }).join('');
    expHtml=cardNP(slabel('⚠️','大型支出一覧')+'<div style="display:flex;flex-direction:column;gap:7px">'+rows+'</div>','padding:18px 20px;margin-bottom:14px');
  }

  // ── 月次サマリーテーブル ────────────────────────────────
  var tRows=FM.map(function(month){
    var d=getMonthData(month),hR=!!(S.reports[month]&&S.reports[month].text),hK=!!S.kpiData[month];
    var note=S.finNotes[month]||{},bal=note.balance!=null?note.balance:null;
    var hasExp=(note.expenses||[]).some(function(e){return e.label;});
    var cols=[d.rev,d.sg,d.op,d.eco,d.net].map(function(v,j){
      var txt=v===0?'<span style="color:'+C.textX+'">—</span>':(v<0?'▲':'')+Math.abs(v).toLocaleString();
      return '<td style="padding:9px 12px;text-align:right;color:'+(j>=2?colV(v):C.text)+';font-weight:'+(j>=2?700:400)+'">'+txt+'</td>';
    }).join('');
    var balTxt=bal!=null?'<span style="font-weight:700;color:'+(bal>=0?C.blue:C.red)+'">'+fmtM(bal)+'</span>':'<span style="font-size:10px;color:'+C.textX+'">未入力</span>';
    return '<tr class="row" data-month="'+month+'" style="border-bottom:1px solid '+C.border+';background:'+C.white+'">'
      +'<td style="padding:9px 12px;font-weight:700;color:'+C.teal+'">'+month+(hasExp?' ⚠️':'')+'</td>'+cols
      +'<td style="padding:9px 12px;text-align:right">'+balTxt+'</td>'
      +'<td style="padding:9px 12px;text-align:right">'+(hK?badge('あり',C.indigo):'<span style="font-size:10px;color:'+C.textX+'">—</span>')+'</td>'
      +'<td style="padding:9px 12px;text-align:right">'+(hR?badge('保存済',C.green):'<span style="font-size:10px;color:'+C.textX+'">未作成</span>')+'</td></tr>';
  }).join('');

  var remColor=remainM!=null?(remainM>=6?C.green:remainM>=3?C.amber:C.red):C.textX;
  return '<div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px">'
    +kTile('年度累計売上',fmtM(totalRev),C.teal,(active[0]?active[0].month:'')+'〜'+(last?last.month:''))
    +kTile('年度累計純損益',fmtM(totalNet),totalNet>=0?C.green:C.red)
    +kTile('直近月 会員数',lastKpi.members_end?lastKpi.members_end+'名':'—',C.indigo,memMs.length?memMs[memMs.length-1].month+'時点':'KPIから取得')
    +kTile('月平均販管費',fmtM(avgSg),C.amber,active.length+'ヶ月平均')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">'
    +kTile('直近残高',lastBal!=null?fmtM(lastBal):'—',lastBal!=null?(lastBal>=0?C.blue:C.red):C.textX,lastBalM?lastBalM+'末時点':'各月に手入力')
    +kTile('残存月数',remainM!=null?(remainM+'ヶ月'):'—',remColor,remainM!=null?'残高÷月平均販管費':'残高入力後に計算')
    +kTile('大型支出 計画中',allExp.filter(function(e){return e.type==='plan';}).length+'件',C.purple)
    +kTile('大型支出 実績',allExp.filter(function(e){return e.type==='actual';}).length+'件',C.orange)
    +'</div>'
    +'<div style="display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:14px">'
    +card(mainChart)
    +card(balChart)+'</div>'
    +expHtml
    +cardNP(slabel('📋','月次損益サマリー（クリックで詳細へ）')
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px;min-width:700px">'
      +'<thead><tr style="background:'+C.surf+';border-bottom:1px solid '+C.border+'">'
      +['月','売上','販管費','営業利益','経常利益','純利益','残高','KPI','報告書'].map(function(h){
        return '<th style="padding:8px 12px;text-align:'+(h==='月'?'left':'right')+';color:'+C.textS+';font-weight:600;font-size:11px">'+h+'</th>';
      }).join('')+'</tr></thead><tbody>'+tRows+'</tbody></table></div>','padding:18px 20px')
    +'</div>';
}


function buildKpiTab(){
  var kpi=S.kpiData[S.selMonth]||{};
  var hasData=!!S.kpiData[S.selMonth];
  var editMode=(S.kpiEditMode===S.selMonth);
  var cats=['売上','会員','稼働','財務','所感'];

  if(editMode){
    var sections=cats.map(function(cat){
      var flds=KPI_FIELDS.filter(function(f){return f[3]===cat;});
      var cc=CAT_COLOR[cat];
      var rows=flds.map(function(f){
        var key=f[0],label=f[1],unit=f[2];
        var val=kpi[key];
        var curStr=(val!=null&&val!=='')?String(val):'';
        var placeholder=unit==='man'?'例: 653179（円単位）':unit==='yen'?'例: 9332（円単位）':unit==='pct'?'例: 83（数字のみ）':unit==='mei'?'例: 174（人数）':unit==='num'?'例: 134（件数）':'テキストを入力';
        var hint=unit==='man'?'円単位で入力（表示は万円に変換）':unit==='yen'?'円単位で入力':unit==='pct'?'%の数字のみ（例: 83）':unit==='mei'?'人数のみ':unit==='num'?'件数のみ':'';
        if(unit==='str'){
          return'<div style="padding:10px 14px;border-radius:9px;background:'+C.surf+';border:1px solid '+C.border+'">'
            +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">'
            +'<div style="font-size:12px;font-weight:700;color:'+cc+'">'+esc(label)+'</div>'
            +(val!=null&&val!==''?'<div style="font-size:10px;color:'+C.textX+'">（保存済み）</div>':'<div style="font-size:10px;color:'+C.textX+'">未設定</div>')
            +'</div>'
            +'<textarea class="kpi-inp kpi-field" data-key="'+key+'" rows="4" style="resize:vertical;width:100%">'+esc(curStr)+'</textarea>'
            +'</div>';
        }
        var inputEl='<input class="kpi-inp kpi-field" data-key="'+key+'" type="number" value="'+esc(curStr)+'" placeholder="'+esc(placeholder)+'" step="any"/>';
        return'<div style="display:grid;grid-template-columns:1fr 1.4fr auto;align-items:start;gap:10px;padding:9px 12px;border-radius:9px;background:'+C.surf+';border:1px solid '+C.border+'">'
          +'<div><div style="font-size:12px;font-weight:700;color:'+cc+'">'+esc(label)+'</div><div style="font-size:10px;color:'+C.textX+';margin-top:2px">'+esc(hint)+'</div></div>'
          +inputEl
          +'<div style="font-size:11px;color:'+C.textX+';white-space:nowrap;padding-top:8px">'+(val!=null&&val!==''?'現在: '+esc(fmtKpi(val,unit)):'未設定')+'</div>'
          +'</div>';
      }).join('');
      return'<div style="margin-bottom:18px">'
        +'<div style="font-size:11px;font-weight:700;color:'+cc+';padding:4px 12px;background:'+cc+'18;border-radius:20px;display:inline-block;margin-bottom:10px">'+cat+'</div>'
        +'<div style="display:flex;flex-direction:column;gap:6px">'+rows+'</div>'
        +'</div>';
    }).join('');
    return card(
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">'
      +'<div><div style="font-size:15px;font-weight:800;color:'+C.text+'">✏️ KPI編集 — '+S.selMonth+'</div>'
      +'<div style="font-size:11px;color:'+C.textX+';margin-top:3px">空欄で保存すると「—」になります。数字項目は数字のみ入力してください。</div></div>'
      +'<div style="display:flex;gap:8px">'+btnS('btn-kpi-cancel','キャンセル','font-size:12px')+btnP('btn-kpi-save','💾 保存','font-size:12px')+'</div>'
      +'</div>'+sections
    );
  }

  if(!hasData){
    return card('<div style="text-align:center;padding:40px 20px">'
      +'<div style="font-size:38px;margin-bottom:12px">📋</div>'
      +'<div style="font-size:15px;font-weight:700;color:'+C.textM+';margin-bottom:8px">'+S.selMonth+'のKPIデータがありません</div>'
      +'<div style="font-size:13px;color:'+C.textS+';margin-bottom:20px">レポートをアップロードするか、手動で直接入力できます</div>'
      +'<div style="display:flex;gap:10px;justify-content:center">'
      +btnP('btn-open-kpi','📋 .docxをアップロード','background:linear-gradient(135deg,'+C.indigo+','+C.purple+')')
      +btnS('btn-kpi-edit','✏️ 手動で入力する')
      +'</div></div>');
  }

  var sections=cats.map(function(cat){
    var cc=CAT_COLOR[cat];
    var numFlds=KPI_FIELDS.filter(function(f){return f[3]===cat&&f[2]!=='str';});
    var strFlds=KPI_FIELDS.filter(function(f){return f[3]===cat&&f[2]==='str';});
    var tiles=numFlds.map(function(f){return kTile(f[1],fmtKpi(kpi[f[0]],f[2]),cc);}).join('');
    var strHtml=strFlds.map(function(f){
      var v=kpi[f[0]];if(!v)return'';
      return'<div style="margin-top:12px">'+slabel(f[3]==='稼働'?'🕐':'✨',f[1])
        +'<div style="font-size:13px;color:'+C.textM+';line-height:1.7;padding:10px 14px;background:'+C.surf+';border-radius:9px;border:1px solid '+C.border+';white-space:pre-wrap">'+esc(v)+'</div></div>';
    }).join('');
    return'<div style="margin-bottom:18px">'
      +'<div style="font-size:11px;font-weight:700;color:'+cc+';padding:4px 12px;background:'+cc+'18;border-radius:20px;display:inline-block;margin-bottom:10px">'+cat+'</div>'
      +(tiles?'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">'+tiles+'</div>':'')
      +strHtml+'</div>';
  }).join('');

  return'<div>'
    +'<div style="display:flex;justify-content:flex-end;margin-bottom:14px">'
    +btnS('btn-kpi-edit','✏️ 編集・修正する','font-size:12px')
    +'</div>'+sections+'</div>';
}

    repBody='<div style="padding:24px 28px;background:'+C.white+'">'

      +(S.genLoading

    var qFields=IQS.map(function(q){

      return '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid '+C.border+'">'

      +'<textarea id="draft-area" style="width:100%;min-height:560px;border:1.5px solid '+C.border+';border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.9;resize:vertical;font-family:monospace">'+(S.draft||'')+'</textarea>'
      // 下部：保存ボタン
      +'<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">'+btnS('btn-rep-cancel','キャンセル')+btnP('btn-save-edit','💾 保存する')+'</div>'

  }else if(rep.text){

  }else{
    repBody='<div style="padding:48px 20px;text-align:center;background:'+C.white+'"><div style="font-size:40px;margin-bottom:12px">📝</div><div style="font-size:15px;font-weight:700;color:'+C.textM+';margin-bottom:7px">'+S.selMonth+'の経営報告書はまだありません</div>'+btnP('btn-rep-create2','✨ AIで経営報告書を作成する','padding:11px 28px;font-size:14px')+'</div>';
  }
  var repHtml=cardNP(
    '<div style="padding:14px 20px;border-bottom:1px solid '+C.border+';display:flex;justify-content:space-between;align-items:center;background:'+C.surf+'">'
    +'<div style="display:flex;align-items:center;gap:9px"><span style="font-size:17px">📝</span><div><div style="font-size:13px;font-weight:800;color:'+C.text+'">'+S.selMonth+' 経営報告書</div>'+(rep.savedAt?'<div style="font-size:10px;color:'+C.textX+'">保存: '+esc(rep.savedAt)+'</div>':'')+'</div>'+(rep.text?badge('保存済み',C.green):'')+'</div>'
    +'<div style="display:flex;gap:7px">'+(S.repMode==='view'?btnS('btn-rep-upload','📁 アップロード','font-size:12px')+(rep.text?btnS('btn-rep-edit','✏️ 内容を修正','font-size:12px')+btnS('btn-rep-delete','🗑️ 削除','font-size:12px;color:'+C.red+';border-color:'+C.red):btnP('btn-rep-create','✨ AIで作成')):btnS('btn-rep-close','✕ 閉じる','font-size:12px'))+'</div></div>'+repBody
  );

    return'<button data-sec="'+id+'" style="padding:6px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:'+(active?'linear-gradient(135deg,'+C.teal+','+C.blue+')':C.white)+';color:'+(active?C.white:C.textS)+'">'+label+'</button>';

    +(S.kpiData[S.selMonth]?badge('KPI取込済',C.indigo):'')+(rep.text?badge('報告書あり',C.green):'')+'</div>'
    +'<div style="display:flex;gap:7px">'+(ai>0?btnS('btn-prev','← '+FM[ai-1],'font-size:12px'):'')+(ai<11?btnS('btn-next',FM[ai+1]+' →','font-size:12px'):'')+'</div></div>'

function render(){
  var content=S.view==='trend'?buildTrend():buildMonth();
  document.getElementById('app').innerHTML=buildHeader()+'<main style="max-width:1160px;margin:0 auto;padding:22px 18px">'+content+'</main>';
  bindEvents();
}
function goMonth(m){S.view=m;S.selMonth=m;S.sec='finance';S.repMode='view';render();}

function bindEvents(){
  document.querySelectorAll('.mtab').forEach(function(b){b.addEventListener('click',function(){var v=b.dataset.view||b.dataset.month;S.view=v;if(v!=='trend')S.selMonth=v;S.sec='finance';S.repMode='view';render();});});
  document.querySelectorAll('.row[data-month]').forEach(function(r){r.addEventListener('click',function(){goMonth(r.dataset.month);});});
  document.querySelectorAll('[data-sec]').forEach(function(b){b.addEventListener('click',function(){S.sec=b.dataset.sec;render();});});
  var cd=document.getElementById('csv-drop'),ci=document.getElementById('csv-input');
  if(cd){cd.addEventListener('click',function(){ci.click();});cd.addEventListener('dragover',function(e){e.preventDefault();});cd.addEventListener('drop',function(e){e.preventDefault();handleCsv(e.dataTransfer.files[0]);});}
  if(ci)ci.addEventListener('change',function(e){handleCsv(e.target.files[0]);});
  var kd=document.getElementById('kpi-drop'),ki=document.getElementById('kpi-input');
  if(kd){kd.addEventListener('click',function(){ki.click();});kd.addEventListener('dragover',function(e){e.preventDefault();});kd.addEventListener('drop',function(e){e.preventDefault();handleKpi(e.dataTransfer.files[0]);});}
  if(ki)ki.addEventListener('change',function(e){handleKpi(e.target.files[0]);});
  var bs=document.getElementById('btn-settings');if(bs)bs.addEventListener('click',function(){S.showSettings=!S.showSettings;render();});

  var boc=document.getElementById('btn-open-csv');if(boc)boc.addEventListener('click',function(){document.getElementById('csv-input').click();});
  var bok=document.getElementById('btn-open-kpi');if(bok)bok.addEventListener('click',function(){document.getElementById('kpi-input').click();});
  var ai=FM.indexOf(S.selMonth);
  var bp=document.getElementById('btn-prev');if(bp)bp.addEventListener('click',function(){goMonth(FM[ai-1]);});
  var bn=document.getElementById('btn-next');if(bn)bn.addEventListener('click',function(){goMonth(FM[ai+1]);});

  // KPI編集
  var bke=document.getElementById('btn-kpi-edit');
  if(bke)bke.addEventListener('click',function(){S.kpiEditMode=S.selMonth;render();});
  var bkc=document.getElementById('btn-kpi-cancel');
  if(bkc)bkc.addEventListener('click',function(){S.kpiEditMode=null;render();});
  var bks=document.getElementById('btn-kpi-save');
  if(bks)bks.addEventListener('click',function(){
    var kpi=Object.assign({},S.kpiData[S.selMonth]||{});
    document.querySelectorAll('.kpi-field').forEach(function(inp){
      var key=inp.dataset.key;
      var raw=inp.value.trim();
      if(raw===''){kpi[key]=null;return;}
      var field=null;
      for(var i=0;i<KPI_FIELDS.length;i++){if(KPI_FIELDS[i][0]===key){field=KPI_FIELDS[i];break;}}
      var unit=field?field[2]:'';
      kpi[key]=(unit==='str')?raw:parseFloat(raw.replace(/,/g,''))||null;
    });
    S.kpiData=Object.assign({},S.kpiData);S.kpiData[S.selMonth]=kpi;
    
    gasPost({action:'save_kpi',month:S.selMonth,data:kpi});
    S.kpiEditMode=null;render();
  });

  var brc=document.getElementById('btn-rep-create');
  var brc2=document.getElementById('btn-rep-create2');
  // 初回作成（データなし）→ iAnsリセット
  if(brc2)brc2.addEventListener('click',function(){S.repMode='create';S.genResult='';if(S.formAnswers&&S.formAnswers[S.selMonth])S.iAns=S.formAnswers[S.selMonth];render();});
  // 再作成ボタン（既存データあり）→ iAnsリセット
  if(brc)brc.addEventListener('click',function(){S.repMode='create';S.genResult='';if(S.formAnswers&&S.formAnswers[S.selMonth])S.iAns=S.formAnswers[S.selMonth];render();});
  var bru=document.getElementById('btn-rep-upload');if(bru)bru.addEventListener('click',function(){S.repMode='upload';render();});
  var brd=document.getElementById('btn-rep-delete');
  if(brd)brd.addEventListener('click',function(){
    if(!confirm('「'+S.selMonth+'」の報告書を削除しますか？この操作は取り消せません。'))return;
    S.reports=Object.assign({},S.reports);
    delete S.reports[S.selMonth];
    S.repMode='view';
    gasPost({action:'delete_report',month:S.selMonth});
    render();
  });
  var bre=document.getElementById('btn-rep-edit');if(bre)bre.addEventListener('click',function(){
    var rep=S.reports[S.selMonth]||{};
    S.draft=rep.text||'';
    S.iAns={};
    // メモリにあればすぐ使う
    if(S.formAnswers&&S.formAnswers[S.selMonth]){
      S.iAns=S.formAnswers[S.selMonth];
      S.repMode='edit';render();
    }else{
      // GASから取得試みる（なくても編集画面は開く）
      S.repMode='edit';render();
      fetch(S.gasUrl+'?type=ians').then(function(r){return r.json();}).then(function(j){
        if(j&&j.ok&&j.formAnswers){
          S.formAnswers=j.formAnswers;
          if(j.formAnswers[S.selMonth]){S.iAns=j.formAnswers[S.selMonth];render();}
        }
      }).catch(function(){});
    }
  });
  var brcl=document.getElementById('btn-rep-close');if(brcl)brcl.addEventListener('click',function(){S.repMode='view';render();});
  var brca=document.getElementById('btn-rep-cancel');if(brca)brca.addEventListener('click',function(){S.repMode='view';render();});
  var bse=document.getElementById('btn-save-edit');
  if(bse)bse.addEventListener('click',function(){var ta=document.getElementById('draft-area');if(!ta)return;document.querySelectorAll('.edit-ans-inp').forEach(function(el){if(el.dataset.key)S.iAns[el.dataset.key]=el.value;});S.formAnswers=Object.assign({},S.formAnswers);S.formAnswers[S.selMonth]=S.iAns;gasPost({action:'save_ians',month:S.selMonth,data:S.iAns});var d={text:ta.value,savedAt:new Date().toLocaleDateString('ja-JP'),iAns:S.iAns};S.reports=Object.assign({},S.reports);S.reports[S.selMonth]=d;gasPost({action:'save_report',month:S.selMonth,data:d});S.repMode='view';render();});
  var bsg=document.getElementById('btn-save-gen');
  if(bsg)bsg.addEventListener('click',function(){var d={text:S.genResult,savedAt:new Date().toLocaleDateString('ja-JP'),iAns:S.iAns};S.reports=Object.assign({},S.reports);S.reports[S.selMonth]=d;gasPost({action:'save_report',month:S.selMonth,data:d});S.repMode='view';S.sec='report';render();});
  // フォームの入力内容をS.iAnsに保存するヘルパー
  function saveFormState(){
    document.querySelectorAll('.rep-form-input').forEach(function(el){
      if(el.dataset.key) S.iAns[el.dataset.key]=el.value;
    });
  }
  var bsf=document.getElementById('btn-submit-form');
  if(bsf)bsf.addEventListener('click',submitForm);

  var rdrop=document.getElementById('rep-drop'),rfile=document.getElementById('rep-file');
  if(rdrop){rdrop.addEventListener('click',function(){rfile.click();});rdrop.addEventListener('dragover',function(e){e.preventDefault();});rdrop.addEventListener('drop',function(e){e.preventDefault();handleRepFile(e.dataTransfer.files[0]);});}
  if(rfile)rfile.addEventListener('change',function(e){handleRepFile(e.target.files[0]);});

  var bbal=document.getElementById('btn-save-bal');
  if(bbal)bbal.addEventListener('click',function(){var inp=document.getElementById('bal-input');if(!inp)return;var v=inp.value.trim();var note=Object.assign({},S.finNotes[S.selMonth]||{});note.balance=v!==''?parseFloat(v):null;S.finNotes=Object.assign({},S.finNotes);S.finNotes[S.selMonth]=note;gasPost({action:'save_finance_notes',data:S.finNotes});render();});
  var badd=document.getElementById('btn-add-expense');
  if(badd)badd.addEventListener('click',function(){var note=Object.assign({},S.finNotes[S.selMonth]||{});note.expenses=(note.expenses||[]).concat([{label:'',amount:'',date:'',type:'plan'}]);S.finNotes=Object.assign({},S.finNotes);S.finNotes[S.selMonth]=note;render();});
  var bexp=document.getElementById('btn-save-expenses');
  if(bexp)bexp.addEventListener('click',function(){
    var types=[].slice.call(document.querySelectorAll('.exp-type'));
    var labels=[].slice.call(document.querySelectorAll('.exp-label'));
    var amounts=[].slice.call(document.querySelectorAll('.exp-amount'));
    var dates=[].slice.call(document.querySelectorAll('.exp-date'));
    var note=Object.assign({},S.finNotes[S.selMonth]||{});
    note.expenses=labels.map(function(_,i){return{type:types[i]?types[i].value:'plan',label:labels[i]?labels[i].value.trim():'',amount:amounts[i]&&amounts[i].value.trim()?parseFloat(amounts[i].value):null,date:dates[i]?dates[i].value:''};}).filter(function(e){return e.label;});
    S.finNotes=Object.assign({},S.finNotes);S.finNotes[S.selMonth]=note;gasPost({action:'save_finance_notes',data:S.finNotes});render();
  });
}

async function extractDocxText(ab){
  if(typeof JSZip==='undefined')throw new Error('JSZipが読み込まれていません');
  var zip=await JSZip.loadAsync(ab);
  var xmlFile=zip.file('word/document.xml');
  if(!xmlFile)throw new Error('word/document.xmlが見つかりません');
  var xml=await xmlFile.async('text');
  return xml
    .replace(/<w:p[ >]/g,'\n<w:p ')
    .replace(/<w:br[^/]*\/>/g,'\n')
    .replace(/<[^>]+>/g,'')
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&apos;/g,"'").replace(/&quot;/g,'"')
    .replace(/[ \t]+/g,' ')
    .split('\n').map(function(l){return l.trim();}).filter(function(l){return l;}).join('\n')
    .slice(0,6000);
}

async function handleCsv(file){
  if(!file||!file.name.endsWith('.csv'))return;
  S.csvName=file.name;var ab=await file.arrayBuffer();var text;
  try{text=new TextDecoder('shift-jis').decode(new Uint8Array(ab));}catch(e){text=new TextDecoder('utf-8').decode(new Uint8Array(ab));}
  S.csv=text;S.raw=parseCSV(text);
  if(S.gasConnected){S.gasStatus='CSV同期中...';render();try{await gasPost({action:'save_csv',csvName:S.csvName,rawData:text});S.gasStatus='✅ CSV同期完了';}catch(e){S.gasStatus='⚠️ CSV同期失敗';}setTimeout(function(){if(S.gasStatus.includes('CSV')){S.gasStatus='';render();}},3000);}
  render();
}

function parseKpiFromText(text){
  function num(pp){for(var i=0;i<pp.length;i++){var m=text.match(pp[i]);if(m){var v=parseInt((m[1]||'').replace(/,/g,''));if(!isNaN(v)&&v>0)return v;}}return null;}
  function flt(pp){for(var i=0;i<pp.length;i++){var m=text.match(pp[i]);if(m){var v=parseFloat(m[1]);if(!isNaN(v))return v;}}return null;}
  function str(pp){for(var i=0;i<pp.length;i++){var m=text.match(pp[i]);if(m)return(m[1]||'').trim().slice(0,100);}return null;}
  return{
    aqxia_sales:num([/アクシア[^\d（【]*(\d[\d,]+)円/,/AQXIA[^\d]*(\d[\d,]+)円/i]),
    air_sales:num([/AIR[^\d（【]*(\d[\d,]+)円/i]),
    total_sales:num([/月間総売上[：:\s]*(\d[\d,]+)円/,/総売上[：:\s]*(\d[\d,]+)円/]),
    aqxia_arpu:num([/アクシア.*?ARPU[^\d]*(\d[\d,]+)/,/アクシア.*?([78],?\d{3})円/]),
    air_arpu:num([/AIR.*?ARPU[^\d]*(\d[\d,]+)/i,/AIR.*?([89],?\d{3})円/i]),
    total_transactions:num([/総売上件数[^\d]*(\d+)件/,/合計.*?(\d+)件/]),
    cashless_ratio:flt([/キャッシュレス[^\d]*(\d+\.?\d*)%/]),
    members_start:num([/月初会員数[^\d]*(\d+)名/,/月初[^\d]+(\d+)名/]),
    members_end:num([/月末[^\d]{0,20}(\d+)名/,/最終会員数[^\d]*(\d+)名/]),
    new_members:num([/入会者[^\d（]*(\d+)名/,/＋(\d+)名/]),
    left_members:num([/退会者[^\d]*(\d+)名/,/－(\d+)名/]),
    churn_rate:null,
    age_50s_pct:flt([/50代[（(](\d+\.?\d*)%/,/50代.*?(\d+\.?\d*)%/]),
    age_60s_pct:flt([/60代[（(](\d+\.?\d*)%/,/60代.*?(\d+\.?\d*)%/]),
    female_pct:flt([/女性\s*(\d+\.?\d*)%/]),
    peak_hour:str([/最大ピーク[^\d]*(\d+)時/,/ピーク[：:\s時帯]*(\d+)時/]),
    low_hour:str([/課題.*?(\d+)時/,/谷間.*?(\d+)時/]),
    low_slots:num([/低稼働枠[^\d計]*(\d+)枠/,/計(\d+)枠/]),
    personal_sales:num([/パーソナル.*合計[^\d]*(\d[\d,]+)円/]),
    personal_sessions:num([/合計\s*(\d+)セッション/,/(\d+)セッション.*合計/]),
    cash_balance:null,
    highlights:str([/【ハイライト[】】]([\s\S]{10,150})(?:【|ローライト|$)/]),
    lowlights:str([/【ローライト[】】]([\s\S]{10,150})(?:【|収益|要因|$)/]),
  };
}

async function handleKpi(file){
  if(!file)return;
  S.kpiLoading=true;S.kpiMsg='📄 読み込み中...';render();
  try{
    var text='';
    if(file.name.endsWith('.docx')||file.name.endsWith('.doc')){var ab=await file.arrayBuffer();text=await extractDocxText(ab);}
    else{text=await file.text();}
    if(!text||text.length<30)throw new Error('テキストが読み取れませんでした（'+text.length+'文字）');
    var kpi=null;
    if(S.gasConnected&&S.gasUrl&&S.adminKey){
      S.kpiMsg='🤖 AI解析中（GAS経由）...';render();
      var gr=await fetch(S.gasUrl,{method:'POST',body:JSON.stringify({adminKey:S.adminKey,action:'extract_kpi',text:text.slice(0,5000)})});
      var gj=await gr.json();
      if(gj&&gj.ok&&gj.kpi){kpi=gj.kpi;}else{throw new Error(gj&&gj.error?gj.error:'GAS経由の解析に失敗しました');}
    }else{
      S.kpiMsg='📊 データ解析中...';render();kpi=parseKpiFromText(text);
    }
    S.kpiData=Object.assign({},S.kpiData);S.kpiData[S.selMonth]=kpi;
    
    gasPost({action:'save_kpi',month:S.selMonth,data:kpi});
    S.kpiMsg='✅ '+S.selMonth+'のKPIを取り込みました';S.sec='kpi';
  }catch(e){S.kpiMsg='⚠️ エラー: '+e.message;console.error('KPI error:',e);}
  S.kpiLoading=false;render();
  setTimeout(function(){S.kpiMsg='';render();},8000);
}

async function handleRepFile(file){
  if(!file)return;
  var msgEl=document.getElementById('upload-msg');
  try{
    var text='';
    if(file.name.endsWith('.docx')){var ab=await file.arrayBuffer();text=await extractDocxText(ab);}else{text=await file.text();}
    if(!text.trim())throw new Error('テキストが読み取れませんでした');
    var d={text:text,savedAt:new Date().toLocaleDateString('ja-JP'),source:file.name};
    S.reports=Object.assign({},S.reports);S.reports[S.selMonth]=d;
    
    gasPost({action:'save_report',month:S.selMonth,data:d});S.repMode='view';render();
  }catch(e){if(msgEl)msgEl.innerHTML='<div style="margin-top:10px;padding:10px;background:#fef2f2;border-radius:8px;font-size:12px;color:#dc2626">⚠️ '+esc(e.message)+'</div>';}
}

async function submitForm(){
  // フォームから全項目を収集
  var ans={};
  document.querySelectorAll('.rep-form-input').forEach(function(el){
    ans[el.dataset.key]=el.value.trim();
  });
  S.iAns=ans;
  S.formAnswers=Object.assign({},S.formAnswers);S.formAnswers[S.selMonth]=ans;
  await gasPost({action:'save_ians',month:S.selMonth,data:ans});
  S.genLoading=true;S.genResult='';render();

  var m=S.selMonth,kpi=S.kpiData[m]||{},a=ans;
  var nl='\n';
  var prompt='あなたは経営コンサルタントです。以下のデータをもとに、スタッフ全員が読みやすい月次経営報告書を日本語マークダウンで作成してください。'+nl+nl
    +'対象月: '+m+nl
    +'売上高: '+fmtY((S.raw['売上高']&&S.raw['売上高'][m])||0)+nl
    +'営業利益: '+fmtY((S.raw['営業利益']&&S.raw['営業利益'][m])||0)+nl
    +'純利益: '+fmtY((S.raw['当期純利益']&&S.raw['当期純利益'][m])||0)+nl
    +'月初会員: '+fmtN(kpi.members_start,'名')+' 月末会員: '+fmtN(kpi.members_end,'名')+nl
    +'入会: +'+fmtN(kpi.new_members,'名')+' 退会: -'+fmtN(kpi.left_members,'名')+nl
    +'ハイライト: '+(kpi.highlights||'なし')+nl
    +'ローライト: '+(kpi.lowlights||'なし')+nl
    +'今月の施策: '+(a.campaign||'なし')+nl
    +'来月の方針: '+(a.next_plan||'未定')+nl
    +'新規事業進捗: '+(a.biz||'なし')+nl
    +'課題・リスク: '+(a.issues||'なし')+nl
    +'来月の大型支出: '+(a.finance2||'なし')+nl
    +'経営者コメント: '+(a.ceo||'なし')+nl
    +(a.free_note?'追加指示・備考: '+a.free_note+nl:'')+nl
    +'【出力ルール】'+nl
    +'- 各セクションは「# ① タイトル」形式で始める'+nl
    +'- 重要な数字・キーワードは **太字** にする'+nl
    +'- 箇条書きは「- 」を使う'+nl
    +'- アクションプランは「1. 」番号付きリストにする'+nl
    +'- 経営者コメントセクションは「> 」引用形式で書く'+nl
    +'- 全体で1200〜1800文字程度'+nl+nl
    +'【構成】この順で作成:'+nl
    +'# ① 今月のサマリー'+nl
    +'# ② 売上・財務状況'+nl
    +'# ③ 会員動向'+nl
    +'# ④ 今月の施策と成果'+nl
    +'# ⑤ 課題と改善策'+nl
    +'# ⑥ 来月のアクションプラン'+nl
    +'# ⑦ 経営者コメント';

  try{
    // GAS経由でのみ生成（ブラウザからの直接API呼び出しはCORSで不可）
    if(!S.gasConnected||!S.gasUrl||!S.adminKey){
      throw new Error('Google Sheets（GAS）に接続してください。\n⚙️ DB設定 → Google Sheets同期 でURLと管理者キーを設定して「接続 & テスト」を押してください。');
    }
    var res=await fetch(S.gasUrl,{method:'POST',body:JSON.stringify({adminKey:S.adminKey,action:'generate_report',prompt:prompt})});
    var rawText=await res.text();
    var j;
    try{j=JSON.parse(rawText);}catch(pe){throw new Error('GAS応答の解析失敗: '+rawText.substring(0,200));}
    if(j&&j.ok&&j.text){
      S.genResult=j.text;
    }else{
      throw new Error(j&&j.error?j.error:'GAS応答異常: '+rawText.substring(0,100));
    }
  }catch(e){
    S.genResult='## ⚠️ 生成エラー\n\n'+e.message;
  }
  S.genLoading=false;render();
}


async function gasPost(body){
  if(!S.gasUrl||!S.adminKey)return;
  try{await fetch(S.gasUrl,{method:'POST',body:JSON.stringify(Object.assign({adminKey:S.adminKey},body))});}catch(e){}
}
async function loadGas(){
  if(!S.gasUrl)return;
  S.dbLoading=true;S.gasStatus='同期中...';render();
  try{
    var r=await fetch(S.gasUrl+'?type=all'),j=await r.json();
    if(j&&j.ok){
      if(j.reports)S.reports=j.reports;if(j.kpi)S.kpiData=j.kpi;
      if(j.financeNotes)S.finNotes=j.financeNotes;
      if(j.formAnswers)S.formAnswers=j.formAnswers;
      if(j.csvData&&j.csvData.rawData&&!S.csv){S.csv=j.csvData.rawData;S.csvName=j.csvData.csvName||'（クラウドから）';S.raw=parseCSV(S.csv);}
      S.gasStatus='✅ 同期完了 ('+new Date().toLocaleTimeString('ja-JP')+')';
    }else{S.gasStatus='⚠️ '+(j&&j.error||'エラー');}
  }catch(e){S.gasStatus='⚠️ '+e.message;}
  S.dbLoading=false;render();
}
async function connectGas(){
  var url=(document.getElementById('gas-url')||{}).value||'';
  var key=(document.getElementById('gas-key')||{}).value||'';
  if(!url||!key)return;
  S.gasTesting=true;S.gasStatus='接続テスト中...';render();
  try{
    var r=await fetch(url+'?type=all'),j=await r.json();
    if(j&&j.ok!==undefined){S.gasConnected=true;S.gasStatus='✅ 接続成功！';S.showSettings=false;S.gasTesting=false;render();setTimeout(loadGas,300);}
    else{S.gasStatus='⚠️ レスポンス不正';S.gasTesting=false;render();}
  }catch(e){S.gasStatus='⚠️ '+e.message;S.gasTesting=false;render();}
}

render();
if(S.gasConnected)loadGas();
</script>
